<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Quicksand:wght@500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    background-color: {{primaryColor}};
    font-family: 'Inter', sans-serif;
  }

  .border-frame {
    position: absolute;
    top: 59px; left: 59px;
    width: 962px; height: 962px;
    border-radius: 20px;
    border: 6px dashed {{secondaryColor}};
    opacity: 0.6;
    z-index: 1;
  }

  .corner-white {
    position: absolute;
    top: 0; right: 0;
    width: 153px; height: 153px;
    background: white;
    border-radius: 0 0 0 20px;
    z-index: 2;
  }

  .asset-left {
    position: absolute;
    top: 582px; left: 33px;
    width: 194px; height: 463px;
    z-index: 3;
  }
  .asset-left img { width: 100%; height: 100%; object-fit: contain; }

  .asset-right {
    position: absolute;
    top: 618px; right: 0;
    width: 421px; height: 462px;
    z-index: 3;
  }
  .asset-right img { width: 100%; height: 100%; object-fit: cover; }

  .header {
    position: absolute;
    top: 101px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 10;
    white-space: nowrap;
  }

  .headline1 {
    font-family: 'Yellowtail', cursive;
    font-size: 80px;
    color: {{accentColor}};
    line-height: 1;
  }

  .headline2 {
    font-family: 'Inter', sans-serif;
    font-size: 128px;
    font-weight: 900;
    color: {{secondaryColor}};
    line-height: 0.9;
    margin-top: -32px;
    letter-spacing: -2px;
    text-transform: uppercase;
  }

  .subtitle-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .subtitle-line { width: 50px; height: 4px; background-color: {{secondaryColor}}; }
  .subtitle-text {
    font-size: 38px;
    font-weight: 700;
    color: {{secondaryColor}};
    text-transform: uppercase;
  }

  .headline3 {
    font-family: 'Inter', sans-serif;
    font-size: 128px;
    font-weight: 900;
    color: {{secondaryColor}};
    line-height: 0.9;
    letter-spacing: -2px;
    text-transform: uppercase;
  }

  .cta-btn {
    background-color: {{secondaryColor}};
    color: {{primaryColor}};
    border-radius: 100px;
    padding: 20px 50px;
    font-family: 'Quicksand', sans-serif;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: 4.4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .details {
    position: absolute;
    top: 720px; left: 218px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
  }

  .detail-row { display: flex; align-items: center; gap: 12px; }
  .detail-icon { width: 36px; height: 36px; font-size: 28px; display: flex; align-items: center; }
  .detail-text { font-size: 32px; color: {{accentColor}}; font-weight: 400; }
  .detail-text strong { font-weight: 700; }

  .date-pill {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background-color: {{secondaryColor}};
    border-radius: 337px;
    padding: 27px 40px;
    z-index: 10;
    white-space: nowrap;
  }

  .date-text {
    font-size: 24px;
    font-weight: 600;
    color: {{primaryColor}};
    letter-spacing: -0.48px;
  }
</style>
</head>
<body>

  <div class="border-frame"></div>
  <div class="corner-white"></div>

  <div class="asset-left"><img src="{{assetLeft}}" alt="" /></div>
  <div class="asset-right"><img src="{{assetRight}}" alt="" /></div>

  <div class="header">
    <div class="headline1">{{headline1}}</div>
    <div class="headline2">{{headline2}}</div>
    <div class="subtitle-row">
      <div class="subtitle-line"></div>
      <div class="subtitle-text">{{subtitle}}</div>
      <div class="subtitle-line"></div>
    </div>
    <div class="headline3">{{headline3}}</div>
    <div class="cta-btn">{{ctaText}}</div>
  </div>

  <div class="details">
    <div class="detail-row">
      <div class="detail-icon">🕐</div>
      <div class="detail-text">{{detail1}}</div>
    </div>
    <div class="detail-row">
      <div class="detail-icon">📍</div>
      <div class="detail-text">{{detail2}}</div>
    </div>
    <div class="detail-row">
      <div class="detail-icon">👥</div>
      <div class="detail-text">{{detail3}}</div>
    </div>
  </div>

  <div class="date-pill">
    <div class="date-text">{{date}}</div>
  </div>

</body>
</html>
