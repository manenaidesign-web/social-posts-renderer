<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --aspect-ratio: 1/1; /* זה ישתנה דינמית לפי הצורך */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* המכולה הראשית - שומרת על הגודל שנבחר */
        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* שכבה 1: הרקע מה-AI (כולל הטקסט התלת-ממדי) */
        .ai-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* שכבה 2: מוצר הלקוח (מלובש מעל) */
        .product-overlay {
            position: absolute;
            bottom: 5%; /* מיקום באזור ה-Safe Zone */
            left: 50%;
            transform: translateX(-50%);
            width: 70%; /* גודל ממוצע למוצר */
            max-height: 60%;
            object-fit: contain;
            z-index: 2;
            /* אפקט צל קל כדי שישתלב ברקע */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* שכבה 3: לוגו הלקוח */
        .logo-overlay {
            position: absolute;
            top: 4%;
            right: 4%;
            width: 15%;
            max-height: 8%;
            object-fit: contain;
            z-index: 3;
            opacity: 0.9;
        }

        /* שכבת הצללה תחתונה (Gradient) כדי לעזור למוצר להיראות "שתול" */
        .ground-shadow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
            z-index: 1.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <img src="{{backgroundImage}}" class="ai-background" alt="Background">

        <div class="ground-shadow"></div>

        {{#if productImage}}
        <img src="{{productImage}}" class="product-overlay" alt="Product">
        {{/if}}

        {{#if logoUrl}}
        <img src="{{logoUrl}}" class="logo-overlay" alt="Logo">
        {{/if}}
    </div>

</body>
</html>
