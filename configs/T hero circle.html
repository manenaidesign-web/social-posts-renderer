<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    background-color: {{primaryColor}};
    font-family: 'Manrope', sans-serif;
  }

  /* ===== ABSTRACT DECORATIONS ===== */

  /* עיגול גדול - פינה שמאל עליון */
  .deco-circle-tl {
    position: absolute;
    top: -120px;
    left: -120px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    border: 40px solid {{secondaryColor}};
    opacity: 0.12;
  }

  /* עיגול קטן - פינה ימין עליון */
  .deco-circle-tr {
    position: absolute;
    top: 60px;
    right: -60px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: {{accentColor}};
    opacity: 0.15;
  }

  /* קו אלכסוני */
  .deco-line-1 {
    position: absolute;
    top: 180px;
    left: -20px;
    width: 300px;
    height: 3px;
    background: {{secondaryColor}};
    opacity: 0.2;
    transform: rotate(-30deg);
  }

  .deco-line-2 {
    position: absolute;
    top: 220px;
    left: -20px;
    width: 200px;
    height: 2px;
    background: {{secondaryColor}};
    opacity: 0.12;
    transform: rotate(-30deg);
  }

  /* נקודות מפוזרות */
  .deco-dot {
    position: absolute;
    border-radius: 50%;
    background: {{secondaryColor}};
  }
  .deco-dot-1 { width: 12px; height: 12px; top: 120px; left: 420px; opacity: 0.3; }
  .deco-dot-2 { width: 8px;  height: 8px;  top: 160px; left: 460px; opacity: 0.2; }
  .deco-dot-3 { width: 6px;  height: 6px;  top: 100px; left: 480px; opacity: 0.15; }
  .deco-dot-4 { width: 14px; height: 14px; bottom: 280px; right: 80px; opacity: 0.2; }
  .deco-dot-5 { width: 8px;  height: 8px;  bottom: 320px; right: 50px; opacity: 0.15; }

  /* צורה גיאומטרית - מרובע מסובב */
  .deco-square {
    position: absolute;
    bottom: 100px;
    left: 60px;
    width: 60px;
    height: 60px;
    border: 3px solid {{accentColor}};
    opacity: 0.2;
    transform: rotate(45deg);
  }

  /* קשת עדינה בפינה שמאל תחתון */
  .deco-arc {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 3px solid {{accentColor}};
    opacity: 0.15;
  }

  /* ===== TEXT AREA - שמאל עליון ===== */
  .text-area {
    position: absolute;
    top: 80px;
    left: 70px;
    width: 560px;
    z-index: 10;
  }

  .headline {
    font-size: 88px;
    font-weight: 800;
    line-height: 1.0;
    color: {{secondaryColor}};
    letter-spacing: -2px;
  }

  .subtext {
    margin-top: 24px;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.5;
    color: {{secondaryColor}};
    opacity: 0.8;
    max-width: 480px;
  }

  /* ===== HERO IMAGE CIRCLE ===== */
  .hero-circle-wrap {
    position: absolute;
    bottom: 0;
    right: -30px;
    width: 680px;
    height: 680px;
    z-index: 5;
  }

  /* הטבעת accent מאחורי התמונה */
  .hero-ring {
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 640px;
    height: 640px;
    border-radius: 50%;
    background: {{accentColor}};
    z-index: 1;
  }

  /* מסכת העיגול לתמונה */
  .hero-img-mask {
    position: absolute;
    bottom: 0;
    right: 30px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
  }

  .hero-img-mask img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* ===== LOGO - פינה שמאל תחתון ===== */
  .logo-wrap {
    position: absolute;
    bottom: 60px;
    left: 70px;
    z-index: 10;
  }

  .logo-wrap img {
    height: 60px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.9;
  }

  /* ===== CTA BUTTON ===== */
  .cta-wrap {
    position: absolute;
    bottom: 180px;
    left: 70px;
    z-index: 10;
  }

  .cta-btn {
    display: inline-block;
    background: {{secondaryColor}};
    color: {{primaryColor}};
    padding: 18px 44px;
    border-radius: 100px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

</style>
</head>
<body>

  <!-- Abstract decorations -->
  <div class="deco-circle-tl"></div>
  <div class="deco-circle-tr"></div>
  <div class="deco-line-1"></div>
  <div class="deco-line-2"></div>
  <div class="deco-dot deco-dot-1"></div>
  <div class="deco-dot deco-dot-2"></div>
  <div class="deco-dot deco-dot-3"></div>
  <div class="deco-dot deco-dot-4"></div>
  <div class="deco-dot deco-dot-5"></div>
  <div class="deco-square"></div>
  <div class="deco-arc"></div>

  <!-- Text -->
  <div class="text-area">
    <div class="headline">{{headline}}</div>
    <div class="subtext">{{subtext}}</div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <div class="cta-btn">{{ctaText}}</div>
  </div>

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="{{logoUrl}}" alt="logo" />
  </div>

  <!-- Hero image circle -->
  <div class="hero-circle-wrap">
    <div class="hero-ring"></div>
    <div class="hero-img-mask">
      <img src="{{heroImage}}" alt="hero" />
    </div>
  </div>

</body>
</html>
