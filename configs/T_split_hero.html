<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Split Hero Template</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Playfair+Display:ital,wght@0,900;1,400;1,900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary:    {{primaryColor}};
  --secondary:  {{secondaryColor}};
  --accent:     {{accentColor}};
  --font-head:  {{fontPrimary}};
  --font-body:  {{fontSecondary}};
}

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #060818;
  font-family: var(--font-body), 'Syne', sans-serif;
}

/* ─── CANVAS ROOT (Playwright screenshots this) ─── */
#canvasRoot {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
  background: #060818;
}

/* ─── IMAGE SIDE (right) ─── */
.image-side {
  position: absolute;
  top: 0;
  right: 0;
  width: 52%;
  height: 100%;
  clip-path: polygon(12% 0%, 100% 0%, 100% 100%, 0% 100%);
}

.image-side .photo {
  position: absolute;
  inset: 0;
  background-image: url('{{heroImageUrl}}');
  background-size: cover;
  background-position: center;
}

/* gradient fade לשמאל כדי לשלב עם הטקסט */
.image-side .fade-left {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(6,8,24,1) 0%,
    rgba(6,8,24,0.4) 30%,
    transparent 100%
  );
}

/* color overlay לפי צבע המותג */
.image-side .color-tint {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(var(--primary-rgb), 0.35) 0%,
    rgba(var(--accent-rgb), 0.15) 100%
  );
  mix-blend-mode: color;
}

/* ─── BACKGROUND EFFECTS (left side) ─── */
.bg-glow {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(var(--primary-rgb), 0.12) 0%,
    transparent 70%
  );
  top: 50%;
  left: -150px;
  transform: translateY(-50%);
  filter: blur(40px);
}

.grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(var(--primary-rgb), 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(var(--primary-rgb), 0.06) 1px, transparent 1px);
  background-size: 108px 108px;
  /* fade out לכיוון ימין */
  mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent 65%);
}

/* ─── DIAGONAL GLOW LINE ─── */
.diagonal-line {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 49%;
  width: 1px;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(var(--primary-rgb), 0.6) 25%,
    rgba(var(--accent-rgb), 0.6) 75%,
    transparent 100%
  );
  filter: blur(0.5px);
}

/* ─── CONTENT (left) ─── */
.content {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 52%;
  padding: 88px 40px 88px 88px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* LOGO */
.logo {
  font-family: var(--font-head), 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* MIDDLE */
.mid {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.eyebrow {
  font-family: var(--font-body), 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--accent);
}

.headline {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* שורה 1: Playfair italic bold */
.hl-1 {
  font-family: 'Playfair Display', serif;
  font-size: 144px;
  font-weight: 900;
  font-style: italic;
  line-height: 0.92;
  color: white;
  text-shadow:
    0 0 40px rgba(var(--primary-rgb), 0.9),
    0 0 80px rgba(var(--primary-rgb), 0.5),
    0 0 120px rgba(var(--accent-rgb), 0.3);
}

/* glow block מאחורי הכותרת */
.headline {
  position: relative;
}
.headline::before {
  content: '';
  position: absolute;
  inset: -20px -40px;
  background: radial-gradient(ellipse at 40% 50%,
    rgba(var(--primary-rgb), 0.2) 0%,
    transparent 70%
  );
  filter: blur(20px);
  z-index: -1;
}

/* שורה 2: outline */
.hl-2 {
  font-family: 'Playfair Display', serif;
  font-size: 144px;
  font-weight: 900;
  font-style: italic;
  line-height: 0.92;
  color: transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.25);
}

.subtext {
  font-family: var(--font-body), 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 400;
  color: rgba(255,255,255,0.35);
  line-height: 1.65;
  max-width: 380px;
}

/* CTA */
.cta-row {
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  padding: 20px 28px;
  background: rgba(var(--primary-rgb), 0.08);
  border: 1px solid rgba(var(--primary-rgb), 0.2);
  backdrop-filter: blur(10px);
  width: fit-content;
}

.cta-row::before {
  content: '';
  position: absolute;
  inset: -1px;
  background: linear-gradient(135deg,
    rgba(var(--primary-rgb), 0.3),
    transparent 50%,
    rgba(var(--accent-rgb), 0.15)
  );
  border-radius: inherit;
  z-index: -1;
  filter: blur(8px);
}

.cta-circle {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  border: 1px solid rgba(var(--primary-rgb), 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: rgba(255,255,255,0.7);
  flex-shrink: 0;
}

.cta-text {
  font-family: var(--font-body), 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: white;
}

/* ─── CORNER DECORATION ─── */
.corner-tl {
  position: absolute;
  top: 48px;
  right: 48px;
}
</style>
</head>
<body>
<div id="canvasRoot">

  <!-- IMAGE RIGHT -->
  <div class="image-side">
    <div class="photo"></div>
    <div class="fade-left"></div>
    <div class="color-tint"></div>
  </div>

  <!-- BG EFFECTS -->
  <div class="bg-glow"></div>
  <div class="grid-lines"></div>
  <div class="diagonal-line"></div>

  <!-- CORNER -->
  <div class="corner-tl">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <path d="M2 24 L2 2 L24 2" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
      <circle cx="2" cy="2" r="2.5" fill="rgba(255,255,255,0.2)"/>
    </svg>
  </div>

  <!-- CONTENT LEFT -->
  <div class="content">

    <div class="logo">{{brandName}}</div>

    <div class="mid">
      <div class="eyebrow">{{tagline}}</div>
      <div class="headline">
        <span class="hl-1">{{headline}}</span>
        <span class="hl-2">{{subheadline}}</span>
      </div>
      <div class="subtext">{{subtext}}</div>
    </div>

    <div class="cta-row">
      <div class="cta-circle">→</div>
      <div class="cta-text">{{ctaText}}</div>
    </div>

  </div>

</div>

<script>
/**
 * CSS RGB helper - מאפשר שימוש בצבעים עם opacity
 * Playwright מריץ את זה לפני הצילום
 */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

const root = document.documentElement;
const primary = getComputedStyle(root).getPropertyValue('--primary').trim();
const accent  = getComputedStyle(root).getPropertyValue('--accent').trim();

if (primary.startsWith('#')) root.style.setProperty('--primary-rgb', hexToRgb(primary));
if (accent.startsWith('#'))  root.style.setProperty('--accent-rgb',  hexToRgb(accent));
</script>
</body>
</html>
