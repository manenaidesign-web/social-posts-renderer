<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Viral Social</title>
    <meta name="viewport" content="width=1080, height=1080, initial-scale=1" />
    <style>
      /*__STYLE__*/
    </style>
  </head>
  <body
    data-variant=""
    data-hero-side=""
    data-hero-mode=""
    data-decor-anchor=""
  >
    <div class="canvas">

      <!-- Zone 1: Background -->
      <div class="bg"></div>

      <!-- Zone 2: Hero image -->
      <div class="hero">
        <div class="heroContact"></div>
        <img id="heroImg" alt="Hero" />
      </div>

      <!-- Zone 3: Depth overlays -->
      <div class="layer spot"></div>
      <div class="layer vignette"></div>
      <div class="layer noise"></div>

      <!-- Zone 4: Decoration -->
      <div class="decorSlot">
        <img id="decorImg" alt="Decoration" />
      </div>

      <!-- Zone 4b: Brand-tinted SVG assets -->
      <div class="asset wave"></div>
      <div class="asset stripes"></div>
      <div class="asset sheen"></div>

      <!-- Zone 5: Text safe area -->
      <div class="textWrap">
        <div id="headline"></div>
        <div id="subtitle"></div>
      </div>

      <!-- Zone 6: CTA + fineprint -->
      <button class="cta"><span id="cta"></span></button>
      <div class="fineprint" id="fineprint"></div>

      <!-- Zone 7: Logo + Badge -->
      <div class="logo">
        <img id="logoImg" alt="Logo" />
        <div class="logoText"></div>
      </div>
      <div class="badge" id="badge"></div>

    </div>

    <script>
      window.__PAYLOAD__ = /*__PAYLOAD__*/ {};
    </script>
    <script>
      /*__FIT__*/
    </script>
    <script>
      /*__RUNTIME__*/
    </script>
  </body>
</html>
